<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEXIVA">
<meta name="theme-color" content="#07090d">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2307090d'/><text y='70' x='50' text-anchor='middle' font-size='58'>⚡</text></svg>">
<title>NEXIVA HQ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090d;--surface:#0d1117;--card:#111827;--border:#1a2332;
  --text:#e2e8f0;--muted:#4b5563;--accent:#00e5ff;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;--purple:#8b5cf6;
  --floor1:#0e1520;--floor2:#0b1219;--floor3:#0c1016;
}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100%;overflow:hidden}
button{font-family:inherit;cursor:pointer;transition:all .2s}
button:hover:not(:disabled){filter:brightness(1.2)}
button:disabled{opacity:.4;cursor:not-allowed}
input,textarea,select{font-family:inherit;font-size:14px;outline:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a2332;border-radius:2px}

/* ── 레이아웃 */
#shell{display:flex;flex-direction:column;height:100vh}

/* ── 헤더 */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10}
.logo{font-weight:800;font-size:15px;letter-spacing:3px;color:var(--accent)}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:1px}

/* ── 워크플로우 스텝바 */
.workflow-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:6px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.workflow-bar::-webkit-scrollbar{display:none}
.wf-step{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid var(--border);color:var(--muted);white-space:nowrap;transition:all .3s}
.wf-step.active{border-color:var(--accent);color:var(--accent);background:#00e5ff10}
.wf-step.done{border-color:var(--green);color:var(--green);background:#10b98110}
.wf-step.waiting{border-color:var(--yellow);color:var(--yellow);background:#f59e0b10;animation:wfPulse 1.5s infinite}
.wf-arrow{color:var(--muted);font-size:12px}
.wf-project{margin-left:auto;font-size:11px;color:var(--green);background:#10b98111;border:1px solid #10b98133;border-radius:12px;padding:3px 10px;white-space:nowrap;flex-shrink:0}

/* ── 오피스 뷰 */
.office-viewport{flex:1;overflow:auto;position:relative;background:var(--bg)}
.office-floor{min-width:900px;min-height:540px;width:100%;height:100%;position:relative;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto;gap:0}

/* ── 방 */
.room{position:relative;border:1px solid #1a2332;padding:16px 12px 12px;overflow:visible}
.room-label{position:absolute;top:6px;left:10px;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.room-planning{background:linear-gradient(135deg,#0f1a0f 0%,var(--floor1) 100%);grid-column:1;grid-row:1}
.room-create{background:linear-gradient(135deg,#0f150f 0%,var(--floor2) 100%);grid-column:2;grid-row:1}
.room-quality{background:linear-gradient(135deg,#130f1a 0%,var(--floor3) 100%);grid-column:3;grid-row:1}
.room-creative{background:linear-gradient(135deg,#1a0f0f 0%,var(--floor1) 100%);grid-column:1 / span 2;grid-row:2}
.room-meeting{background:linear-gradient(135deg,#0a1020 0%,#0d1830 100%);grid-column:3;grid-row:2;cursor:pointer}
.room-meeting:hover{background:linear-gradient(135deg,#0c1428,#101e38)}

/* ── 데스크 행 */
.desk-row{display:flex;gap:20px;flex-wrap:wrap;margin-top:12px;justify-content:center}

/* ── 개별 데스크 유닛 */
.desk-unit{display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer;transition:transform .2s}
.desk-unit:hover{transform:translateY(-3px)}
.desk-unit:hover .desk-surface{border-color:color-mix(in srgb,var(--c,#00e5ff) 60%,transparent)}

/* ── 캐릭터 피규어 */
.figure{display:flex;flex-direction:column;align-items:center;position:relative;z-index:2;margin-bottom:2px}
.fig-head{width:28px;height:28px;border-radius:50%;background:color-mix(in srgb,var(--c,#00e5ff) 18%,#111827);border:2px solid color-mix(in srgb,var(--c,#00e5ff) 45%,transparent);display:flex;align-items:center;justify-content:center;font-size:15px;position:relative}
.fig-body{width:20px;height:14px;background:color-mix(in srgb,var(--c,#00e5ff) 12%,#0d1117);border:1px solid color-mix(in srgb,var(--c,#00e5ff) 20%,transparent);border-radius:3px 3px 0 0;margin-top:-1px}
.fig-legs{display:flex;gap:3px;margin-top:1px}
.fig-leg{width:7px;height:8px;background:color-mix(in srgb,var(--c,#00e5ff) 10%,#111827);border-radius:0 0 3px 3px;border:1px solid color-mix(in srgb,var(--c,#00e5ff) 15%,transparent)}

/* ── 캐릭터 애니메이션 */
.figure.working{animation:workBob .9s ease-in-out infinite}
.figure.idle{animation:idleSway 4s ease-in-out infinite}
.figure.resting .fig-head::after{content:'💤';position:absolute;top:-12px;right:-8px;font-size:10px;animation:zFloat 1.5s ease-in-out infinite}

/* ── 데스크 표면 */
.desk-surface{width:60px;height:10px;background:color-mix(in srgb,var(--c,#00e5ff) 10%,#0d1218);border:1px solid color-mix(in srgb,var(--c,#00e5ff) 20%,transparent);border-radius:3px 3px 0 0;position:relative;display:flex;align-items:center;justify-content:center;gap:4px}
.desk-monitor{width:18px;height:13px;background:#050810;border:1.5px solid color-mix(in srgb,var(--c,#00e5ff) 40%,transparent);border-radius:2px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.desk-monitor.on{box-shadow:0 0 6px color-mix(in srgb,var(--c,#00e5ff) 50%,transparent)}
.monitor-lines{display:flex;flex-direction:column;gap:1.5px;padding:2px;width:100%}
.m-line{height:1.5px;background:var(--c,#00e5ff);border-radius:1px;opacity:.6}
.m-line.typing{animation:typeAnim .6s steps(4) infinite alternate}
.monitor-check{color:var(--green);font-size:8px}
.desk-leg-l,.desk-leg-r{width:3px;height:12px;background:color-mix(in srgb,var(--c,#00e5ff) 12%,#0d1117);position:absolute;bottom:-12px}
.desk-leg-l{left:8px}.desk-leg-r{right:8px}
.desk-chair{width:14px;height:10px;background:color-mix(in srgb,var(--c,#00e5ff) 8%,#0d1117);border:1px solid color-mix(in srgb,var(--c,#00e5ff) 12%,transparent);border-radius:2px 2px 0 0;margin-top:12px}

/* ── 이름 태그 */
.name-tag{font-size:10px;font-weight:700;color:color-mix(in srgb,var(--c,#00e5ff) 80%,var(--text));margin-top:6px;text-align:center}
.role-tag{font-size:8px;color:var(--muted);text-align:center;letter-spacing:.5px}

/* ── 말풍선 */
.speech{position:absolute;top:-30px;left:50%;transform:translateX(-50%);background:color-mix(in srgb,var(--c,#00e5ff) 12%,#0d1117);border:1px solid color-mix(in srgb,var(--c,#00e5ff) 30%,transparent);border-radius:8px 8px 8px 0;padding:4px 7px;font-size:9px;white-space:nowrap;z-index:10;pointer-events:none;animation:fadeIn .3s}
.speech::after{content:'';position:absolute;bottom:-4px;left:6px;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid color-mix(in srgb,var(--c,#00e5ff) 30%,transparent)}

/* ── 작업 진행 배지 */
.task-badge{position:absolute;top:-8px;right:-8px;width:16px;height:16px;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;z-index:5}
.task-badge.working{background:var(--accent);color:#000;animation:blink .8s infinite}
.task-badge.done{background:var(--green);color:#000}
.task-badge.error{background:var(--red);color:#fff}
.task-badge.resting{background:var(--yellow);color:#000}

/* ── 회의실 씬 */
.meeting-table{width:80px;height:44px;background:#0a1220;border:1.5px solid #1a2e50;border-radius:10px;margin:16px auto 0;position:relative;display:flex;align-items:center;justify-content:center}
.meeting-table-top{font-size:9px;color:#1a3a5c;font-weight:700;letter-spacing:1px}
.meeting-chairs{display:flex;justify-content:space-around;margin-top:4px}
.meeting-chair{width:12px;height:8px;background:#0d1829;border:1px solid #1a2e50;border-radius:2px}
.meeting-label-big{font-size:20px;text-align:center;margin-top:8px}
.room-meeting .room-label-sub{font-size:10px;color:#1a3a5c;text-align:center;margin-top:4px}

/* ── 하단 컨트롤 패널 */
.ctrl-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.btn:hover:not(:disabled){filter:brightness(1.2);transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-accent{background:#00e5ff18;border:1px solid #00e5ff55;color:var(--accent)}
.btn-green{background:#10b98118;border:1px solid #10b98155;color:var(--green)}
.btn-yellow{background:#f59e0b18;border:1px solid #f59e0b55;color:var(--yellow)}
.btn-red{background:#ef444418;border:1px solid #ef444455;color:var(--red)}
.btn-purple{background:#8b5cf618;border:1px solid #8b5cf655;color:var(--purple)}
.ctrl-hint{font-size:11px;color:var(--muted);flex:1;min-width:0}

/* ── 오버레이 모달 */
.overlay{position:fixed;inset:0;background:#000b;z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-title{font-weight:700;font-size:15px}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.x-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px;line-height:1}

/* ── 채팅 */
.chat-box{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.msg{display:flex;gap:8px;align-items:flex-end}
.msg.user{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:8px;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.msg-bubble{max-width:80%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg.ai .msg-bubble{background:var(--card);border:1px solid var(--border)}
.msg.user .msg-bubble{background:#00e5ff18;border:1px solid #00e5ff33}
.msg-name{font-size:10px;font-weight:700;margin-bottom:3px}
.typing{display:flex;gap:4px;padding:8px 4px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
.chat-input-row{display:flex;gap:8px}
.chat-input-row textarea{flex:1;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);resize:none;height:60px;font-size:13px}

/* ── 아이템 카드 */
.idea-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
@media(max-width:500px){.idea-grid{grid-template-columns:1fr}}
.idea-card{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--yellow);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s}
.idea-card:hover,.idea-card.selected{border-color:var(--accent);background:#00e5ff08}
.idea-card.selected{border-top-color:var(--accent)}
.idea-name{font-weight:700;font-size:14px;margin-bottom:6px}
.idea-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:10px;padding:2px 7px;border-radius:4px}
.idea-plan{font-size:11px;color:var(--muted);line-height:1.5}

/* ── 진행상황 트래커 */
.task-tracker{display:flex;flex-direction:column;gap:10px}
.task-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.task-emp{display:flex;align-items:center;gap:7px;width:100px;flex-shrink:0}
.task-emp-emoji{font-size:18px}
.task-emp-name{font-size:12px;font-weight:700}
.task-progress{flex:1}
.task-status-text{font-size:11px;margin-bottom:5px;color:var(--muted)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s}
.task-done-text{font-size:11px;color:var(--green);font-weight:700}

/* ── 알림 배너 */
.notif{position:fixed;top:16px;right:16px;background:var(--surface);border:1px solid var(--accent);border-radius:14px;padding:14px 18px;max-width:320px;z-index:200;animation:slideLeft .3s ease;box-shadow:0 8px 32px #000a}
.notif-title{font-weight:700;font-size:14px;color:var(--accent);margin-bottom:4px}
.notif-body{font-size:12px;color:var(--text);line-height:1.6;margin-bottom:10px}
.notif-actions{display:flex;gap:7px}

/* ── 검토 패널 */
.review-result{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;max-height:200px;overflow-y:auto;font-size:12px;line-height:1.7;white-space:pre-wrap;margin-bottom:12px}
.form-label{font-size:11px;color:var(--muted);letter-spacing:.8px;margin-bottom:5px;display:block}
.form-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px}
.form-textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;resize:vertical;min-height:80px}

/* ── 완료 프로젝트 목록 */
.done-list{padding:16px;max-width:700px;margin:0 auto}
.done-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:10px;padding:14px;margin-bottom:10px}
.done-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.done-name{font-weight:700;font-size:14px;color:var(--green)}
.done-time{font-size:11px;color:var(--muted)}
.done-actions{display:flex;gap:7px;margin-top:8px}

/* ── API 게이트 */
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.gate-box{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:18px;padding:32px 28px;width:100%;max-width:380px;text-align:center}

/* ── 직원 편집 폼 */
.emoji-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.ep{width:34px;height:34px;border-radius:7px;background:var(--card);border:1.5px solid var(--border);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ep.sel,.ep:hover{border-color:var(--accent);background:#00e5ff10}
.color-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.cp{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.cp.sel{border-color:#fff;transform:scale(1.15)}

/* ── 애니메이션 */
@keyframes workBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes idleSway{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}}
@keyframes zFloat{0%,100%{transform:translateY(0) rotate(-10deg)}50%{transform:translateY(-4px) rotate(10deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideLeft{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes typeAnim{from{width:10%}to{width:90%}}
@keyframes wfPulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ 모달 확대/축소 ═══ */
.modal.maximized{max-width:100%!important;width:100%;height:96vh;max-height:96vh}
.modal.maximized .chat-box,.modal.maximized #sChatBox,.modal.maximized #meetChat,.modal.maximized .review-result{max-height:none!important;height:auto!important}
.modal.maximized .modal-body{flex:1}
.max-btn{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;padding:2px 6px;line-height:1}
.max-btn:hover{color:var(--accent)}

/* ═══ 📱 모바일 전용 레이아웃 ═══ */
@media (max-width: 680px) {
  /* 헤더: 로고 한 줄 + 버튼 가로 스크롤 */
  .hdr{flex-wrap:wrap;padding:8px 10px;gap:8px}
  .hdr > div[style*="margin-left:auto"]{
    margin-left:0 !important;width:100%;
    overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;
    padding-bottom:2px;scrollbar-width:none;
  }
  .hdr > div[style*="margin-left:auto"]::-webkit-scrollbar{display:none}
  .hdr > div[style*="margin-left:auto"] .btn{flex-shrink:0}

  /* 오피스: 가로 스크롤 없애고 세로로 쌓기 */
  .office-viewport{overflow-x:hidden}
  .office-floor{
    display:flex !important;flex-direction:column;
    min-width:0 !important;min-height:0 !important;
    gap:0;
  }
  .room{
    grid-column:auto !important;grid-row:auto !important;
    width:100%;padding:24px 10px 14px;border-width:0 0 1px 0;
  }
  .desk-row{gap:14px;margin-top:8px}

  /* 데스크/캐릭터 살짝 키워서 터치 쉽게 */
  .desk-unit{padding:2px 4px}
  .name-tag{font-size:11px}
  .role-tag{font-size:9px}

  /* 회의실 카드 적당히 */
  .room-meeting{min-height:120px}

  /* 모달: 더 넓게 + 입력 편하게 */
  .modal{max-width:100%;max-height:92vh}
  .modal-body{padding:14px}
  .modal-footer{padding:10px 14px;gap:6px}
  .modal-footer .btn{flex:1 1 auto;font-size:12px;padding:9px 10px}

  /* 입력창 확대(아이폰 줌 방지 위해 16px) */
  .form-input,.form-textarea,.chat-input-row textarea{font-size:16px}

  /* 워크플로우 바 글자 약간 축소 */
  .wf-step{padding:4px 8px;font-size:10px}
  .wf-project{font-size:10px;padding:3px 8px}
}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <div style="font-size:34px;margin-bottom:10px">⚡</div>
    <div style="font-weight:800;font-size:20px;letter-spacing:3px;color:var(--accent);margin-bottom:5px">NEXIVA HQ</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:22px">직원들이 출근 대기 중입니다</div>
    <input id="keyInput" type="password" placeholder="Claude API 키 (sk-ant-...)"
      style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-size:14px;margin-bottom:8px;display:block"/>
    <div id="keyErr" style="font-size:11px;color:var(--red);margin-bottom:8px;display:none">올바른 API 키를 입력해주세요</div>

function cloudUrl() {
  return cloudCfg.dbUrl.replace(/\/$/,'') + '/nexiva/' + encodeURIComponent(cloudCfg.code) + '.json';

function cloudPush() {
  if (!cloudCfg.enabled || !cloudCfg.dbUrl || !cloudCfg.code) return;

      staff: localStorage.getItem('nx_staff'),
      done: localStorage.getItem('nx_done'),
      mcp: localStorage.getItem('nx_mcp'),
      suno: localStorage.getItem('nx_suno'),

    try { await fetch(cloudUrl(), { method:'PATCH', body: JSON.stringify(payload) }); }
    catch(e) {}
  }, 700);
}

function applyCloudData(d) {
  if (!d) return;
  cloudApplying = true;
  try {
    if (d.staff != null) { localStorage.setItem('nx_staff', d.staff); STAFF = JSON.parse(d.staff); }
    if (d.done != null) { localStorage.setItem('nx_done', d.done); completedProjects = JSON.parse(d.done); }
    if (d.mcp != null) { localStorage.setItem('nx_mcp', d.mcp); mcpServers = JSON.parse(d.mcp); }
    if (d.suno != null) { localStorage.setItem('nx_suno', d.suno); sunoCfg = JSON.parse(d.suno); }
    if (d.ledger != null) { localStorage.setItem('nx_ledger', d.ledger); try { revenueLedger = JSON.parse(d.ledger); } catch(e){} }
    if (d.brief) { handleIncomingBrief(d.brief); }
    renderAll();
  } catch(e) {}
  setTimeout(() => { cloudApplying = false; }, 150);
}

function cloudConnect() {
  cloudDisconnect();
  if (!cloudCfg.enabled || !cloudCfg.dbUrl || !cloudCfg.code) { cloudStatus='off'; return; }
  cloudStatus = 'connecting'; updateCloudBadge();
  try {
    cloudES = new EventSource(cloudUrl()); // EventSource는 Accept: text/event-stream 자동 전송
    const handler = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg && msg.data) applyCloudData(msg.data);
        cloudStatus = 'live'; updateCloudBadge();
      } catch(e) {}
    };
    cloudES.addEventListener('put', handler);
    cloudES.addEventListener('patch', handler);
    cloudES.onopen = () => { cloudStatus='live'; updateCloudBadge(); };
    cloudES.onerror = () => { cloudStatus='error'; updateCloudBadge(); }; // 브라우저가 자동 재연결
  } catch(e) { cloudStatus='error'; updateCloudBadge(); }
}

function cloudDisconnect() {
  if (cloudES) { try { cloudES.close(); } catch(e){} cloudES = null; }
}

function updateCloudBadge() {

  const [icon,txt,col] = map[cloudStatus] || map.off;
  el.innerHTML = `<span style="color:${col}">${icon} ${txt}</span>`;
}

// 활성화된 MCP 서버를 API 형식으로 변환
function activeMcpPayload() {
  const enabled = mcpServers.filter(m => m.enabled && m.url);
  if (!enabled.length) return null;
  return enabled.map(m => {
    const o = { type:'url', url:m.url, name:(m.name||'server').replace(/[^a-zA-Z0-9_-]/g,'_') };
    if (m.token) o.authorization_token = m.token;
    return o;
  });
}

async function callClaude(system, messages, staffId) {
  for (let attempt = 0; attempt < 3; attempt++) {
    let res;
    try {
      const headers = {'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
      const body = {model:MODEL, max_tokens:MAX_TOKENS, system, messages};
      const mcp = activeMcpPayload();
      if (mcp) { body.mcp_servers = mcp; headers['anthropic-beta'] = 'mcp-client-2025-04-04'; }
      res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers, body: JSON.stringify(body)
      });
    } catch(e) { throw new Error('네트워크 오류: ' + e.message); }

    if (res.status === 429 || res.status === 529 || res.status === 503) {
      const wait = parseInt(res.headers.get('retry-after')||'60',10);
      if (staffId) startRest(staffId, wait);
      if (attempt < 2) { await sleep(wait * 1000); if (staffId) { taskStatus[staffId]='working'; renderOffice(); } continue; }
      throw new Error('rate_limit:' + wait);
    }
    const data = await res.json();
    if (data.error) {
      if (/rate_limit|overloaded/i.test(data.error.type||'')) {
        if (staffId) startRest(staffId, 60);
        throw new Error('rate_limit:60');
      }
      throw new Error(data.error.message || JSON.stringify(data.error));
    }
    // MCP 사용 시 tool_use 블록이 섞일 수 있으므로 text 블록만 추출
    const textBlocks = (data.content || []).filter(c => c.type === 'text').map(c => c.text);
    return textBlocks.join('\n') || '(응답 없음)';
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── 스트리밍 Claude API (글자 단위 실시간)
async function callClaudeStream(system, messages, staffId, onChunk) {
  let res;
  try {
    const headers = {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    };
    const body = { model: MODEL, max_tokens: MAX_TOKENS, system, messages, stream: true };
    const mcp = activeMcpPayload();
    if (mcp) { body.mcp_servers = mcp; headers['anthropic-beta'] = 'mcp-client-2025-04-04'; }
    res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers, body: JSON.stringify(body)
    });
  } catch(e) { throw new Error('네트워크 오류: ' + e.message); }

  if (res.status === 429 || res.status === 529 || res.status === 503) {
    const wait = parseInt(res.headers.get('retry-after') || '60', 10);
    if (staffId) startRest(staffId, wait);
    throw new Error('rate_limit:' + wait);
  }
  if (!res.ok) {
    const d = await res.json().catch(()=>({}));
    throw new Error(d.error?.message || 'HTTP ' + res.status);
  }

  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let full = '';
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') continue;
      try {
        const ev = JSON.parse(raw);
        if (ev.type === 'content_block_delta' && ev.delta?.text) {
          full += ev.delta.text;
          if (onChunk) onChunk(full);
        }
        if (ev.type === 'message_delta' && ev.delta?.stop_reason) {
          _lastStreamStop = ev.delta.stop_reason;   // 잘림 여부 감지
        }
        if (ev.type === 'error') throw new Error(ev.error?.message || 'stream error');
      } catch(e) { if (e.message.includes('stream error')) throw e; }
    }
  }
  return full;
}

// ── 긴 글 자동 이어쓰기 (잘리면 끝까지 이어붙임)
async function streamLong(system, baseMessages, staffId, onChunk, maxRounds = 6) {
  const messages = baseMessages.slice();
  let full = '';
  for (let i = 0; i < maxRounds; i++) {
    _lastStreamStop = 'end_turn';
    const part = await callClaudeStream(system, messages, staffId, (partial) => {
      if (onChunk) onChunk(full + (i > 0 ? '\n' : '') + partial);
    });
    full += (i > 0 ? '\n' : '') + part;
    if (_lastStreamStop !== 'max_tokens') break;  // 끝까지 다 씀
    messages.push({ role: 'assistant', content: part });
    messages.push({ role: 'user', content: '끊긴 부분 바로 다음부터 이어서 계속 작성해줘. 이미 쓴 내용은 절대 반복하지 말고, 인사말 없이 본문만 이어가.' });
    if (onChunk) onChunk(full + '\n\n…(이어쓰는 중)');
  }
  return full;
}

function startRest(staffId, seconds) {
  if (restTimers[staffId]) clearInterval(restTimers[staffId].iv);
  taskStatus[staffId] = 'resting';
  restTimers[staffId] = { rem: seconds };
  renderOffice();
  restTimers[staffId].iv = setInterval(() => {
    restTimers[staffId].rem--;
    const el = document.getElementById('rest-' + staffId);
    if (el) el.textContent = fmtTime(restTimers[staffId].rem);
    if (restTimers[staffId].rem <= 0) {
      clearInterval(restTimers[staffId].iv);
      delete restTimers[staffId];
      if (taskStatus[staffId] === 'resting') { taskStatus[staffId]='idle'; renderOffice(); }
    }
  }, 1000);
}

function fmtTime(s) { const m=Math.floor(s/60); return m>0?m+'분 '+( s%60)+'초':(s)+'초'; }

async function startPlanning() {
  wfState = 'planning';
  taskStatus['planner'] = 'working';
  renderAll();

  const planner = getStaff('planner');
  if (!planner) { alert('기획팀장을 찾을 수 없습니다'); cancelWorkflow(); return; }

  try {
    const text = await callClaude(
      planner.prompt,
      [{role:'user', content:'음악·비트·영상·콘텐츠·디지털상품 등 다양한 분야에서 수익 아이템 4개 발굴. JSON 배열만 응답: [{"name":"","platform":"","time":"","revenue":"","plan":"","dept":""}] dept는 주로 담당할 팀(제작팀/크리에이티브/기획팀 중 하나)'}],
      'planner'
    );
    let ideas;
    try { ideas = JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch(e) { ideas = [{name:'AI 부업 완전정복 가이드',platform:'크몽',time:'3시간',revenue:'월 50~150만원',plan:'직장인 대상 AI 부업 실전 가이드북 PDF',dept:'제작팀'}]; }

    currentIdeas = ideas;
    taskStatus['planner'] = 'done';
    wfState = 'meeting';
    selectedIdea = null;
    renderAll();
    openIdeaSelectModal();
  } catch(e) {
    if (!e.message.startsWith('rate_limit:')) {
      taskStatus['planner'] = 'idle';
      wfState = 'idle';
      renderAll();
      showNotif('⚠️ 오류', e.message, [], true);
    } else {
      taskStatus['planner'] = 'resting';
      renderAll();
    }
  }
}

function cancelWorkflow() {
  wfState = 'idle'; currentProject = null; currentIdeas = []; selectedIdea = null;
  Object.keys(taskStatus).forEach(k => { if(taskStatus[k]==='working') taskStatus[k]='idle'; });
  renderAll();
}

async function autoMeetingBrief(attendees) {
  const planner = getStaff('planner');
  const cfo = getStaff('cfo');
  if (!planner) return;

  addMeetMsg(null, `📋 <strong>${currentProject.name}</strong> 안건으로 회의를 시작합니다.`, null);

  try {
    taskStatus['planner'] = 'working'; renderOffice();
    const intro = await callClaude(
      planner.prompt,
      [{role:'user', content:`회의 안건: "${currentProject.name}" (플랫폼: ${currentProject.platform}, 예상수익: ${currentProject.revenue}). 대표님께 이 프로젝트 진행 이유와 핵심 전략을 3~4문장으로 브리핑해주세요.`}],
      'planner'
    );
    addMeetMsg(planner, intro, null);
    taskStatus['planner'] = 'done'; renderOffice();
  } catch(e) { if(!e.message.startsWith('rate_limit:')) addMeetMsg(null, '박준서 브리핑 오류: ' + e.message, null); }

  if (cfo) {
    try {
      taskStatus['cfo'] = 'working'; renderOffice();
      const fin = await callClaude(
        cfo.prompt,
        [{role:'user', content:`"${currentProject.name}" 프로젝트. 예상 수익성과 주요 리스크를 2~3문장으로만.`}],
        'cfo'
      );
      addMeetMsg(cfo, fin, null);
      taskStatus['cfo'] = 'done'; renderOffice();
    } catch(e) { if(!e.message.startsWith('rate_limit:')) addMeetMsg(null, 'CFO 분석 오류: ' + e.message, null); }
  }
}

function addMeetMsg(staff, text, userText) {
  if (userText !== null && userText !== undefined) {
    meetingHistory.push({role:'user', text: userText || text});
  } else if (staff) {
    meetingHistory.push({role:'ai', staffId: staff.id, text});
  } else {
    meetingHistory.push({role:'system', text});
  }
  renderMeetChat();
}

function renderMeetChat() {
  const box = document.getElementById('meetChat');
  if (!box) return;
  box.innerHTML = meetingHistory.map(m => {
    if (m.role === 'system') return `<div style="text-align:center;font-size:11px;color:var(--muted);padding:4px 0">${m.text}</div>`;
    if (m.role === 'user') return `<div class="msg user"><div class="msg-bubble">${m.text}</div></div>`;
    const s = getStaff(m.staffId);
    return `<div class="msg ai">
      <div class="msg-av" style="background:${s?s.color+'20':'#111827'};border:1px solid ${s?s.color+'30':'#1a2332'}">${s?s.emoji:'💬'}</div>
      <div class="msg-bubble"><div class="msg-name" style="color:${s?s.color:'var(--muted)'}">${s?s.name:'시스템'}</div>${m.text}</div>
    </div>`;
  }).join('') + (meetingLoading ? `<div class="msg ai"><div class="msg-av">⚙️</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>` : '');
  box.scrollTop = box.scrollHeight;
}

function openMeetSendRow() {
  const footer = document.querySelector('.modal-footer');
  if (!footer || document.getElementById('meetInputRow')) return;
  const row = document.createElement('div');
  row.id = 'meetInputRow';
  row.style.cssText = 'width:100%;display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--border)';
  row.innerHTML = `<input id="meetInput" class="form-input" placeholder="회의 중 의견을 입력하세요..." style="flex:1" onkeydown="if(event.key==='Enter')sendMeetMsg()"/>
    <button class="btn btn-accent" onclick="sendMeetMsg()">전송</button>`;
  footer.before(row);
  setTimeout(() => { const inp=document.getElementById('meetInput'); if(inp) inp.focus(); }, 50);
}

async function sendMeetMsg() {
  const inp = document.getElementById('meetInput');
  if (!inp || !inp.value.trim() || meetingLoading) return;
  const msg = inp.value.trim();
  inp.value = '';
  addMeetMsg(null, msg, msg);
  meetingLoading = true;
  renderMeetChat();

  const attendees = STAFF.filter(s => ['planner','cfo'].includes(s.id) || s.dept === currentProject.dept);
  const responder = attendees[Math.floor(Math.random() * attendees.length)];
  if (!responder) { meetingLoading=false; return; }

  try {
    taskStatus[responder.id] = 'working'; renderOffice();
    // 회의 히스토리에서 API용 메시지 구성 (user 시작 필수)
    const meetApiMsgs = meetingHistory
      .filter(m => m.role==='user' || m.role==='ai')
      .map(m => ({role: m.role==='user'?'user':'assistant', content:(m.text||'').replace(/<[^>]+>/g,'').trim()}))
      .filter(m => m.content);
    while (meetApiMsgs.length > 0 && meetApiMsgs[0].role==='assistant') meetApiMsgs.shift();
    if (meetApiMsgs.length===0 || meetApiMsgs[meetApiMsgs.length-1].role!=='user') meetApiMsgs.push({role:'user',content:msg});
    const reply = await callClaude(
      responder.prompt + `\n현재 "${currentProject.name}" 프로젝트 회의 중. 대표 말에 2~3문장으로 자연스럽게 답변.`,
      meetApiMsgs,
      responder.id
    );
    addMeetMsg(responder, reply, null);
    taskStatus[responder.id] = 'done'; renderOffice();
  } catch(e) { if(!e.message.startsWith('rate_limit:')) addMeetMsg(null, '오류: ' + e.message, null); }
  meetingLoading = false;
  renderMeetChat();
}

function confirmWork() {
  if (!currentProject) return;
  closeModal();
  wfState = 'working';
  taskResults = {};

  // 담당팀 직원들 + 편집장
  const workers = STAFF.filter(s => s.dept === currentProject.dept || s.id === 'editor');
  workers.forEach(s => { taskStatus[s.id] = 'idle'; });
  renderAll();

  // 병렬 제작 실행
  runProductionPipeline(workers);
}

async function runProductionPipeline(workers) {
  // Step 1: 리서처 먼저 (있으면)
  const researcher = getStaff('researcher');
  if (researcher && workers.find(w=>w.id==='researcher')) {
    await runTask(researcher, `프로젝트: "${currentProject.name}" (${currentProject.platform}). 시장 조사 리포트를 작성해주세요. 경쟁 분석, 예상 수익, 차별화 포인트 포함.`);
  }

  // Step 2: 메인 제작 (병렬)
  const mainWorkers = workers.filter(s => !['researcher','editor'].includes(s.id));
  const researchCtx = taskResults['researcher'] ? `\n\n[리서치 결과]\n${taskResults['researcher'].slice(0,800)}` : '';

  await Promise.all(mainWorkers.map(s => {
    let task = '';
    if (s.id==='docmaker')  task = `프로젝트: "${currentProject.name}" (${currentProject.platform} 판매용).
크몽 상위 1% 판매자 수준의 디지털 상품 완성본을 작성하세요.

[필수 품질 기준]
- 분량: A4 기준 최소 25페이지 이상 (충분히 길고 깊게)
- 구조: 표지문구 → 목차 → 서문(왜 필요한가) → 본문 챕터 5개 이상 → 부록(템플릿/체크리스트)
- 각 챕터: 핵심개념 + 실전 예시 2개 이상 + 바로 쓰는 템플릿/체크리스트 + 흔한 실수
- 모든 주장에 구체적 수치·사례 포함, 두루뭉술 표현 금지
- 구매자가 "이 가격이 아깝지 않다, 당장 써먹겠다" 느낄 완성도
- 마크다운(#, ##, ###, -, 표) 으로 깔끔하게 구조화
절대 "~생략" "이하 동일" 같은 축약 금지. 전부 완성형으로.${researchCtx}`;
    else if (s.id==='designer') task = `프로젝트: "${currentProject.name}". Canva 디자인 기획안을 작성하세요. 상품 표지·썸네일 색상코드·폰트·레이아웃 상세 지정.${researchCtx}`;
    else if (s.id==='music') task = `프로젝트: "${currentProject.name}". Suno/Udio용 음악 제작 기획서와 프롬프트를 작성하세요. 장르·분위기·가사·AI 도구 활용법 포함.${researchCtx}`;
    else if (s.id==='beatmaker') task = `프로젝트: "${currentProject.name}". 판매용 비트 기획서를 작성하세요. BPM·장르·구조·AI 프롬프트·BeatStars 판매 전략 포함.${researchCtx}`;
    else if (s.id==='video') task = `프로젝트: "${currentProject.name}". 유튜브/숏폼 영상 기획서와 스크립트를 작성하세요. 제목·훅·본문·CTA 완성본 포함.${researchCtx}`;
    else task = `프로젝트: "${currentProject.name}". 담당 업무를 수행해주세요.${researchCtx}`;
    return runTask(s, task);
  }));

  // Step 3: 편집장 최종 취합 (납품물 형식 = 아이템 종류에 맞게)
  const editor = getStaff('editor');
  if (editor) {
    const allCtx = Object.entries(taskResults).map(([id,r]) => {
      const st = getStaff(id);

    const kind = projectKind();
    let finalInstruction;
    if (kind === 'music' || kind === 'beat') {
      finalInstruction = `프로젝트: "${currentProject.name}". 아래 팀 결과물을 취합하여 **실제로 음원을 뽑아낼 수 있는 최종 제작 패키지**를 만들어주세요.
반드시 포함:

3. 🎤 가사 (있는 경우 전체)
4. 🏷️ 판매 메타데이터 (제목/장르/BPM/태그/설명)
5. 💰 ${currentProject.platform} 판매 등록 가이드
※ 사장님이 이 프롬프트를 Suno/Udio에 붙여넣어 실제 비트를 생성합니다. 프롬프트는 절대 생략 없이 완성형으로.\n\n${allCtx}`;
    } else if (kind === 'video') {
      finalInstruction = `프로젝트: "${currentProject.name}". 아래 결과물을 취합하여 **바로 촬영/제작 가능한 영상 제작 패키지**를 만들어주세요.
포함: 제목 후보, 썸네일 문구·디자인 지시, 전체 스크립트(컷별), AI 영상도구(Runway/Pika) 프롬프트(코드블록), 업로드 메타데이터·해시태그.\n\n${allCtx}`;
    } else {
      finalInstruction = `프로젝트: "${currentProject.name}" (${currentProject.platform} 판매용).
아래 팀원 결과물을 취합하여 **그대로 판매 가능한 최종 완성본**을 만들어주세요.

[취합 기준]
- 리서치·콘텐츠·디자인 기획을 하나의 매끄러운 완성 문서로 통합
- 중복 제거, 흐름 정리, 빠진 부분 직접 보완
- 맨 앞에 [상품 소개글]: 제목 후보 3개 + 한 줄 후킹 + 판매 설명문(구매전환용) 추가
- 본문은 마크다운으로 구조화 (#, ##, ###, 목록, 표)
- 분량 충분히, 상위 1% 판매자 수준, 내용 축약·생략 절대 금지

먼저 [상품 소개글] 섹션, 그 다음 [본문 완성본] 순서로.\n\n${allCtx}`;
    }
    await runTask(editor, finalInstruction);
  }

  // 완료
  wfState = 'reviewing';
  renderAll();
  showProjectComplete();
}

async function runTask(staff, taskPrompt) {
  const MAX_ATTEMPTS = 10;
  // 업무 설명 저장 (라이브 패널용)
  taskDesc[staff.id] = taskPrompt.slice(0, 120) + (taskPrompt.length > 120 ? '...' : '');
  streamBuf[staff.id] = '';

  for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
    taskStatus[staff.id] = 'working';
    streamBuf[staff.id] = '';
    renderOffice();
    try {
      const result = await streamLong(
        staff.prompt,
        [{role:'user', content: taskPrompt}],
        staff.id,
        (partial) => {
          streamBuf[staff.id] = partial;
          // 라이브 패널이 열려있으면 실시간 업데이트
          updateLivePanel(staff.id, partial);
        }
      );
      taskResults[staff.id] = result;
      streamBuf[staff.id] = result;
      taskStatus[staff.id] = 'done';
      renderOffice();
      updateLivePanel(staff.id, result, true);
      return;
    } catch(e) {
      if (e.message && e.message.startsWith('rate_limit:')) {
        const waitSecs = parseInt(e.message.split(':')[1], 10) || 60;
        await sleep((waitSecs + 2) * 1000);
      } else {
        taskResults[staff.id] = '오류: ' + e.message;
        taskStatus[staff.id] = 'error';
        renderOffice();
        return;
      }
    }
  }
  taskStatus[staff.id] = 'error';
  taskResults[staff.id] = '최대 재시도 횟수 초과';
  renderOffice();
}

function openProgressModal() {
  const workers = STAFF.filter(s => taskStatus[s.id] && taskStatus[s.id] !== 'idle');
  const rows = workers.map(s => {
    const st = taskStatus[s.id] || 'idle';
    const color = st==='done'?'var(--green)':st==='working'?'var(--accent)':st==='error'?'var(--red)':'var(--yellow)';
    const pct = st==='done'?100:st==='working'?Math.floor(Math.random()*60+20):0;
    const statusLabel = {working:'작업중...',done:'완료',error:'오류',resting:'휴식중',idle:'대기'}[st]||st;
    return `<div class="task-row">
      <div class="task-emp"><span class="task-emp-emoji">${s.emoji}</span><div><div class="task-emp-name">${s.name}</div><div style="font-size:9px;color:var(--muted)">${s.role}</div></div></div>
      <div class="task-progress">
        <div class="task-status-text" style="color:${color}">${statusLabel}${st==='resting'&&restTimers[s.id]?' ('+fmtTime(restTimers[s.id].rem)+')':''}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
        ${st==='done'&&taskResults[s.id]?`<div class="task-done-text">✓ ${taskResults[s.id].length.toLocaleString()}자 생성</div>`:''}
      </div>
    </div>`;
  }).join('');

  openModal('progressModal', '⚙️ 제작 진행 상황', `<div class="task-tracker">${rows}</div>`, [
    {label:'닫기', cls:'btn-accent', action:'closeModal()'},
  ]);
}

function approveProject() {
  const result = {
    project: currentProject,
    results: {...taskResults},
    timestamp: new Date().toLocaleString('ko-KR'),
    status: 'approved',
    live: false,         // 업로드(판매개시) 여부
    revenue: []          // [{date:'YYYY-MM-DD', amount:number}]
  };
  result.kind = projectKind();
  completedProjects.unshift(result);
  saveDone();
  // 종류별 자동 저장: 문서형은 PDF, 크리에이티브는 .txt 패키지
  if (result.kind === 'doc') {
    downloadPDF(true);
  } else {
    const txt = taskResults['editor'] || Object.values(taskResults).pop() || '';
    if (txt) saveTxt((currentProject?currentProject.name:'package') + '_제작패키지', txt);
  }
  closeModal();

  // 초기화
  wfState = 'idle';
  currentProject = null;
  currentIdeas = [];
  taskResults = {};
  Object.keys(taskStatus).forEach(k => taskStatus[k]='idle');
  renderAll();

  // 방금 승인한 프로젝트(맨 앞)의 업로드 체크리스트 열기
  openUploadChecklist(0);
}

// 프로젝트에 맞는 가이드 객체 반환 (공용)
function getGuideFor(p) {
  const platform = (p?.platform || '').toLowerCase();
  const kind = guessKind(p);
  if (/gumroad/.test(platform)) return guideGumroad();
  if (/etsy/.test(platform)) return guideEtsy();
  if (/beatstars|airbit/.test(platform) || kind==='beat') return guideBeatStars();
  if (/유튜브|youtube/.test(platform) || kind==='video') return guideYouTube();
  if (/블로그|네이버|티스토리|blog/.test(platform)) return guideBlog();
  return guideKmong();
}

    <div style="background:#10b98110;border:1px solid #10b98133;border-radius:9px;padding:10px;font-size:11px;color:var(--green);line-height:1.6;margin-top:4px">
      💡 ${guide.tip}
    </div>
    <div id="checkProgress" style="text-align:center;font-size:12px;color:var(--muted);margin-top:12px">0 / ${guide.steps.length} 완료</div>

function toggleCheck(i, checked, total, idx) {
  checklistState[i] = checked;
  updateCheckUI(total);
}

function updateCheckUI(total) {
  const done = Object.values(checklistState).filter(Boolean).length;
  const prog = document.getElementById('checkProgress');
  if (prog) prog.textContent = `${done} / ${total} 완료`;
  // 완료 버튼은 다 체크해야 활성화
  const footer = document.querySelector('#checklistModal .modal-footer');
  if (footer) {
    const doneBtn = footer.querySelector('button');
    if (doneBtn) {
      const allDone = done >= total;
      doneBtn.disabled = !allDone;
      doneBtn.style.opacity = allDone ? '1' : '0.4';
    }
  }
}

function finishUpload(idx) {
  const proj = completedProjects[idx];
  if (!proj) return;
  proj.live = true;
  proj.liveSince = new Date().toLocaleDateString('ko-KR');
  saveDone();
  closeModal();
  showNotif('🚀 판매 시작!', `"${proj.project.name}"이(가) 판매 등록되었습니다.\n이제 매일 수익을 입력해 매출을 관리하세요.`, [
    {label:'💰 매출 입력하러 가기', action:'closeNotif();openRevenue()'}

}

function requestRevision() {
  const note = document.getElementById('revisionNote').value.trim();
  if (!note) { alert('보완 요청 내용을 입력해주세요'); return; }
  closeModal();
  wfState = 'working';

  const editor = getStaff('editor');
  if (editor) {
    taskStatus[editor.id] = 'idle';
    renderAll();
    const prevResult = taskResults[editor.id] || '';
    runTask(editor, `[보완 요청]\n${note}\n\n[기존 결과물]\n${prevResult}\n\n위 보완 요청 사항을 반영하여 수정된 최종본을 작성해주세요.`)
      .then(() => { wfState='reviewing'; renderAll(); showProjectComplete(); });
  }
}

function downloadPDF(silent) {
  const editor = getStaff('editor');
  const finalResult = taskResults['editor'] || taskResults[Object.keys(taskResults).pop()] || '';
  if (!finalResult) { if(!silent) alert('결과물이 없습니다'); return; }

  const lines = finalResult.split('\n').map(l => {
    if(l.startsWith('# ')) return `<h1>${l.slice(2)}</h1>`;
    if(l.startsWith('## ')) return `<h2>${l.slice(3)}</h2>`;
    if(l.startsWith('### ')) return `<h3>${l.slice(4)}</h3>`;
    if(l.startsWith('- ')) return `<li>${l.slice(2)}</li>`;
    if(l.match(/^\d+\. /)) return `<li>${l.replace(/^\d+\. /,'')}</li>`;
    if(l.startsWith('> ')) return `<blockquote>${l.slice(2)}</blockquote>`;
    if(l==='---') return '<hr/>';
    return l ? `<p>${l}</p>` : '<br/>';

  const dateStr = new Date().toLocaleString('ko-KR');
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${currentProject?currentProject.name:'NEXIVA 결과물'}</title>

h1{font-size:26px;font-weight:800;margin:16px 0 10px}h2{font-size:19px;margin:32px 0 10px;padding:10px 16px;border-left:4px solid #00e5ff;background:#f8faff;font-weight:700}
h3{font-size:16px;margin:20px 0 8px;font-weight:700}p{margin:10px 0;color:#334155}li{margin:6px 0 6px 24px;color:#334155}
blockquote{background:#f8faff;border-left:4px solid #00e5ff;padding:12px 20px;margin:16px 0;color:#1e40af;border-radius:0 8px 8px 0}
hr{border:none;border-top:1px solid #e2e8f0;margin:28px 0}
footer{margin-top:50px;padding-top:16px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8;display:flex;justify-content:space-between}
.no-print{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:10px 16px;margin-bottom:20px;font-size:12px;color:#0369a1}
@media print{.no-print{display:none}body{padding:20px 30px}}
</style></head><body>
<div class="no-print">💡 Cmd+P → PDF 저장 | 생성: ${dateStr}</div>
<header><div class="badge">NEXIVA · ${editor?editor.name:'편집장'}</div>
<h1>${currentProject?currentProject.name:'NEXIVA 결과물'}</h1>

<script>setTimeout(()=>window.print(),600);<\/script>

  const url = URL.createObjectURL(new Blob([html], {type:'text/html'}));
  window.open(url, '_blank');
}

function pdfFromLive(staffId) {
  const s = getStaff(staffId);
  const text = taskResults[staffId] || streamBuf[staffId] || '';
  if (!text) { alert('결과물이 없습니다'); return; }
  const prevProject = currentProject;
  currentProject = {name: s ? s.role + ' 결과물' : '결과물'};
  const prevResults = taskResults;
  taskResults = {editor: text};
  downloadPDF(false);
  currentProject = prevProject;
  taskResults = prevResults;
}

  const s = getStaff(staffId);

  saveChats();
  refreshStaffChatUI(staffId, s, false);
}

async function sendStaffChat(staffId) {
  const s = getStaff(staffId);
  const inp = document.getElementById('sChatInput');
  if (!inp || !inp.value.trim() || staffChatLoading[staffId]) return;
  const msg = inp.value.trim();
  inp.value = '';

  staffChatHistory[staffId].push({role:'user', text: msg});
  refreshStaffChatUI(staffId, s, false);

  // ★ "진행하자" 류 결정 → 회의실로 에스컬레이션
  if (/진행하|진행시|진행할|진행해|진행 ?ㄱ|회의실|회의로|ㄱㄱ|고고|컨펌|확정|승인할|좋아 ?진행/i.test(msg)) {
    escalateToMeeting(staffId);
    return;
  }

  staffChatLoading[staffId] = true;
  refreshStaffChatUI(staffId, s, true);

  taskStatus[staffId] = 'working'; renderOffice();

  // ★ 평가 모드: 길게 작업하지 말고 기대효과만 간략 판단
  const assessSys = s.prompt + `

[대화 규칙 — 매우 중요]
대표가 업무·아이디어를 제시하면, 절대 긴 작업물을 바로 만들지 마라.
대신 그 일의 "기대효과가 있는지/없는지"를 핵심만 3~4문장으로 간략히 판단하라.
- 수익성·실현 가능성·소요 대비 효과 관점에서 솔직하게
- 마지막 줄에 반드시 결론: "👍 진행할 가치 있음" 또는 "👎 비추천" 중 하나
대표가 "진행하자"라고 하면 시스템이 회의실로 넘긴다(너는 신경 쓰지 마라).`;

  const buildMessages = () => {
    const allMsgs = staffChatHistory[staffId]
      .filter(m => m.role === 'user' || m.role === 'ai')
      .map(m => ({role: m.role==='user'?'user':'assistant', content: (m.text||'').trim()}))
      .filter(m => m.content);
    const firstUser = allMsgs.findIndex(m => m.role === 'user');
    return firstUser >= 0 ? allMsgs.slice(firstUser) : [{role:'user', content: msg}];
  };

  // 스트리밍용 임시 메시지 슬롯
  staffChatHistory[staffId].push({role:'ai', text: '', streaming: true});
  refreshStaffChatUI(staffId, s, true);

  const MAX_CHAT_RETRIES = 5;
  let chatDone = false;
  for (let attempt = 1; attempt <= MAX_CHAT_RETRIES && !chatDone; attempt++) {
    try {
      taskStatus[staffId] = 'working'; renderOffice();
      // 스트리밍: 글자 올 때마다 마지막 슬롯 업데이트
      const result = await callClaudeStream(assessSys, buildMessages(), staffId, (partial) => {
        const hist = staffChatHistory[staffId];
        if (hist.length && hist[hist.length-1].streaming) {
          hist[hist.length-1].text = partial;
          refreshStaffChatUI(staffId, s, false);
        }
      });
      // 완료: 스트리밍 플래그 제거
      const hist = staffChatHistory[staffId];
      if (hist.length && hist[hist.length-1].streaming) {
        hist[hist.length-1].text = result;
        hist[hist.length-1].streaming = false;
      }
      taskStatus[staffId] = 'done';
      chatDone = true;
    } catch(e) {
      if (e.message && e.message.startsWith('rate_limit:')) {
        const waitSecs = parseInt(e.message.split(':')[1], 10) || 60;
        const hist = staffChatHistory[staffId];
        if (hist.length && hist[hist.length-1].streaming) {
          hist[hist.length-1].text = `😴 토큰 재생성 중... ${waitSecs}초 후 자동 재시도`;
        }
        refreshStaffChatUI(staffId, s, false);
        await sleep((waitSecs + 2) * 1000);
        // 재시도 전 메시지 리셋
        const h2 = staffChatHistory[staffId];
        if (h2.length && h2[h2.length-1].streaming) h2[h2.length-1].text = '';
      } else {
        const hist = staffChatHistory[staffId];
        if (hist.length && hist[hist.length-1].streaming) {
          hist[hist.length-1].text = '오류: ' + e.message;
          hist[hist.length-1].streaming = false;
        }
        taskStatus[staffId] = 'idle';
        chatDone = true;
      }
    }
  }
  staffChatLoading[staffId] = false;
  saveChats();   // ★ 대화 저장 (새로고침해도 유지)
  renderOffice();
  refreshStaffChatUI(staffId, s, false);
}

// ★ 직원 채팅 → 회의실로 가져가기 (필요 팀원 초대)
async function escalateToMeeting(staffId) {
  const s = getStaff(staffId);
  if (!s) return;
  staffChatHistory[staffId].push({ role:'ai', text:'좋습니다 대표님! 🏛️ 회의실로 가져가 필요한 팀원들과 진행하겠습니다. 잠시만요...' });
  refreshStaffChatUI(staffId, s, false);

  // 지금까지의 논의를 프로젝트로 정리
  const convo = staffChatHistory[staffId].filter(m => m.role === 'user').map(m => m.text).join('\n');
  let project = null;
  try {
    const raw = await callClaude(
      '너는 기획 보조다. 대화를 판매 가능한 프로젝트로 한 번에 정리한다.',
      [{ role:'user', content:`다음 논의 내용을 하나의 프로젝트로 정리해서 JSON만 출력:\n"""${convo}"""\n\n{"name":"구체적 상품/프로젝트명","platform":"크몽/Gumroad/Etsy/BeatStars/유튜브/네이버 중 적합","revenue":"월 예상수익","plan":"한 줄 설명","dept":"${s.dept}"}` }],
      staffId
    );
    const m = raw.replace(/```json|```/g, '').trim().match(/\{[\s\S]*\}/);
    if (m) project = JSON.parse(m[0]);
  } catch (e) {}
  if (!project || !project.name) {
    project = { name: (convo.split('\n')[0] || s.role + ' 업무').slice(0, 50), platform: '크몽', revenue: '-', plan: convo.slice(0, 80), dept: s.dept };
  }

  currentProject = project;
  selectedIdea = project;
  meetingHistory = [];
  wfState = 'meeting';
  closeModal();          // 직원 채팅 닫기
  renderAll();
  openMeetingModal();    // 회의실 입장 (planner·cfo·해당팀 자동 초대)
}

function refreshStaffChatUI(staffId, s, loading) {
  const box = document.getElementById('sChatBox');
  if (!box) return;
  box.innerHTML = staffChatHistory[staffId].map(m => {
    if(m.role==='ai') return `<div class="msg ai"><div class="msg-av" style="background:${s.color}20;border:1px solid ${s.color}30">${s.emoji}</div><div class="msg-bubble"><div class="msg-name" style="color:${s.color}">${s.name}</div>${m.text}${m.text.length>200?`<div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap"><button class="btn btn-green" style="padding:4px 10px;font-size:11px" onclick="saveChatToDone('${staffId}')">💾 완료목록 저장</button><button class="btn btn-accent" style="padding:4px 10px;font-size:11px" onclick="openPDFFromText('${staffId}')">📄 PDF</button></div>`:''}</div></div>`;
    return `<div class="msg user"><div class="msg-bubble">${m.text}</div></div>`;
  }).join('') + (loading ? `<div class="msg ai"><div class="msg-av" style="background:${s.color}20">${s.emoji}</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>` : '');
  box.scrollTop = box.scrollHeight;
}

// 대화 결과를 완료목록에 저장 (Firebase/폰 동기화 + 영구 보관)
function saveChatToDone(staffId) {
  const s = getStaff(staffId);
  const last = staffChatHistory[staffId] && staffChatHistory[staffId].slice().reverse().find(m => m.role==='ai' && m.text.length>100);
  if (!last || !s) { alert('저장할 결과가 없어요'); return; }
  completedProjects.unshift({
    project: { name: s.name + ' — 대화 결과', platform: '직접대화', revenue: '-', plan: last.text.slice(0,80), dept: s.dept },
    results: { editor: last.text },
    timestamp: new Date().toLocaleString('ko-KR'),
    status: 'task', kind: 'doc', live: false, revenue: [], fromChat: true
  });
  saveDone();
  showNotif('💾 저장 완료', '완료목록에 저장했어요 (폰에도 동기화).', [], true);
}

function openPDFFromText(staffId) {
  const s = getStaff(staffId);
  const last = staffChatHistory[staffId]?.slice().reverse().find(m=>m.role==='ai'&&m.text.length>100);
  if (!last || !s) return;
  const savedProject = currentProject;
  const savedId = staffId;
  // temp swap
  const tmp = currentProject;
  currentProject = {name: s.role + ' 결과물'};
  taskResults = {editor: last.text};
  downloadPDF(false);
  currentProject = tmp;
  taskResults = {};
}

function resetAllData() {
  if (!confirm('정말 모든 데이터를 초기화할까요?\n직원·완료목록·매출·작업큐·대화·브리핑이 전부 삭제됩니다.')) return;
  if (!confirm('한 번 더 확인할게요. 진짜 처음부터 다시 시작하시겠어요? (되돌릴 수 없어요)')) return;
  // 로컬 삭제 (API키 nx_key, 동기화 nx_cloud 는 유지)
  ['nx_staff','nx_done','nx_mcp','nx_suno','nx_ledger','nx_queue','nx_chats','nx_brief_seen','nx_project','nx_agenda','nx_results','nx_schedules']
    .forEach(k => localStorage.removeItem(k));
  // 클라우드도 비우기 (연결돼 있으면)
  if (cloudCfg.enabled && cloudCfg.dbUrl && cloudCfg.code) {
    try { fetch(cloudUrl(), { method:'PUT', body: JSON.stringify(null) }); } catch(e) {}
  }
  setTimeout(() => { alert('✅ 초기화 완료! 새로 시작합니다.'); location.reload(); }, 400);
}

function genCloudCode() {
  const code = 'nexiva-' + Math.random().toString(36).slice(2,8);
  const el = document.getElementById('cloud-code');
  if (el) el.value = code;
}

function saveCloudSync() {
  const dbUrl = (document.getElementById('cloud-url').value||'').trim();
  const code = (document.getElementById('cloud-code').value||'').trim();
  const enabled = document.getElementById('cloud-enabled').checked;
  if (enabled && (!dbUrl || !code)) { alert('동기화를 켜려면 DB URL과 코드가 필요해요'); return; }
  if (dbUrl && !/^https:\/\/.+/.test(dbUrl)) { alert('Firebase URL은 https:// 로 시작해야 해요'); return; }
  cloudCfg = { dbUrl: dbUrl.replace(/\/$/,''), code, enabled };
  saveCloudCfg();
  if (enabled) {
    cloudConnect();
    // 최초 연결: 로컬 데이터가 있으면 한 번 올려둠 (원격이 비었을 때 대비)
    setTimeout(() => { if (!cloudApplying) cloudPushNow(); }, 1500);
    showNotif('🌐 동기화 켜짐', '이제 같은 URL+코드를 쓰는 모든 기기가 실시간 공유됩니다.', [], true);
  } else {
    cloudDisconnect(); cloudStatus='off';
    showNotif('동기화 꺼짐', '이 기기에만 저장됩니다.', [], true);
  }
  updateCloudBadge();
}

// 즉시 1회 푸시 (디바운스 없이)
async function cloudPushNow() {
  if (!cloudCfg.enabled || !cloudCfg.dbUrl || !cloudCfg.code) return;
  const payload = {
    staff: localStorage.getItem('nx_staff'),
    done: localStorage.getItem('nx_done'),
    mcp: localStorage.getItem('nx_mcp'),
    suno: localStorage.getItem('nx_suno'),
    ledger: localStorage.getItem('nx_ledger'),
    ts: Date.now()
  };
  try { await fetch(cloudUrl(), { method:'PATCH', body: JSON.stringify(payload) }); } catch(e) {}
}

function exportData() {
  const data = {
    _app: 'NEXIVA-HQ', _version: 1, _exported: new Date().toISOString(),
    staff: localStorage.getItem('nx_staff'),
    done: localStorage.getItem('nx_done'),
    mcp: localStorage.getItem('nx_mcp'),
    suno: localStorage.getItem('nx_suno'),
    ledger: localStorage.getItem('nx_ledger')
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'NEXIVA_백업_' + todayStr() + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  showNotif('💾 백업 완료', '백업 파일이 저장되었습니다.\n다른 기기에서 이 파일로 복원하세요.', [], true);
}

function importData(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data._app !== 'NEXIVA-HQ') throw new Error('NEXIVA 백업 파일이 아닙니다');
      if (!confirm('현재 데이터를 백업 파일 내용으로 덮어씁니다. 계속할까요?')) return;
      if (data.staff != null) localStorage.setItem('nx_staff', data.staff);
      if (data.done != null) localStorage.setItem('nx_done', data.done);
      if (data.mcp != null) localStorage.setItem('nx_mcp', data.mcp);
      if (data.suno != null) localStorage.setItem('nx_suno', data.suno);
      if (data.ledger != null) localStorage.setItem('nx_ledger', data.ledger);
      alert('✅ 복원 완료! 앱을 새로고침합니다.');
      location.reload();
    } catch(err) {
      alert('❌ 복원 실패: ' + err.message);
    }
  };
  reader.readAsText(file);
}

      </div>
      ${it.trend?`<div style="font-size:11px;color:var(--text);line-height:1.6;margin-bottom:5px"><b style="color:var(--muted)">📈 트렌드:</b> ${it.trend}</div>`:''}
      ${it.why_now?`<div style="font-size:11px;color:var(--text);line-height:1.6;margin-bottom:5px"><b style="color:var(--muted)">⏰ 왜 지금:</b> ${it.why_now}</div>`:''}
      ${it.how_to_monetize?`<div style="font-size:11px;color:var(--text);line-height:1.6"><b style="color:var(--muted)">💰 수익화:</b> ${it.how_to_monetize}</div>`:''}

function briefToQueue(i) {
  const it = cloudBrief && cloudBrief.items && cloudBrief.items[i];

  const planner = getStaff('planner') || STAFF[0];

  closeModal();
  showNotif('🗂️ 작업 추가됨', `"${it.title}" 기획을 작업큐에 넣었어요.`, [], true);
}

const MONTHLY_GOAL = 10000000; // 월 1000만원 목표

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function won(n) { return (n||0).toLocaleString('ko-KR') + '원'; }

function sumRevenue(proj, filterFn) {
  return (proj.revenue||[]).filter(filterFn||(()=>true)).reduce((a,r)=>a+(r.amount||0), 0);
}

function openRevenue() {
  const live = completedProjects.filter(p => p.live);
  const today = todayStr();
  const month = today.slice(0,7); // YYYY-MM

  // 전체 합계
  let totalAll = 0, totalToday = 0, totalMonth = 0;
  const acc = (date, amount) => {
    totalAll += amount||0;
    if (date === today) totalToday += amount||0;
    if ((date||'').slice(0,7) === month) totalMonth += amount||0;
  };
  completedProjects.forEach(p => (p.revenue||[]).forEach(r => acc(r.date, r.amount)));
  revenueLedger.forEach(r => acc(r.date, r.amount));  // 직접 기록한 수익도 합산

  const goalPct = Math.min(100, Math.round(totalMonth / MONTHLY_GOAL * 100));

  const liveHtml = live.length ? live.map((p) => {
    const realIdx = completedProjects.indexOf(p);
    const pMonth = sumRevenue(p, r => (r.date||'').slice(0,7)===month);
    const pToday = sumRevenue(p, r => r.date===today);
    return `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px">
          <div style="font-weight:700;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">🟢 ${p.project.name}</div>
          <div style="font-size:11px;color:var(--muted);white-space:nowrap">${p.project.platform}</div>
        </div>
        <div style="display:flex;gap:14px;margin-bottom:10px">
          <div><div style="font-size:9px;color:var(--muted)">오늘</div><div style="font-size:14px;font-weight:700;color:var(--accent)">${won(pToday)}</div></div>
          <div><div style="font-size:9px;color:var(--muted)">이번달</div><div style="font-size:14px;font-weight:700;color:var(--green)">${won(pMonth)}</div></div>
        </div>
        <div style="display:flex;gap:7px">
          <input id="rev-${realIdx}" type="number" inputmode="numeric" class="form-input" placeholder="오늘 매출 입력 (원)" style="flex:1;padding:8px 10px;font-size:13px"/>
          <button class="btn btn-green" style="padding:8px 14px;font-size:12px" onclick="addRevenue(${realIdx})">+ 입력</button>
        </div>
      </div>`;
  }).join('') : `<div style="text-align:center;padding:30px 16px;color:var(--muted);font-size:13px">아직 판매 중인 상품이 없어요.<br>프로젝트를 승인하고 업로드 체크리스트를 완료하면 여기에 나타나요.</div>`;

  openModal('revenueModal', '💰 매출 관리', `
    <div style="background:linear-gradient(135deg,#10b98115,#00e5ff10);border:1px solid #10b98133;border-radius:14px;padding:16px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div><div style="font-size:10px;color:var(--muted)">오늘</div><div style="font-size:18px;font-weight:800;color:var(--accent)">${won(totalToday)}</div></div>
        <div><div style="font-size:10px;color:var(--muted)">이번달</div><div style="font-size:18px;font-weight:800;color:var(--green)">${won(totalMonth)}</div></div>
        <div><div style="font-size:10px;color:var(--muted)">누적</div><div style="font-size:18px;font-weight:800;color:var(--text)">${won(totalAll)}</div></div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:5px">🎯 월 목표 1,000만원 — ${goalPct}%</div>
      <div style="height:10px;background:var(--bg);border-radius:5px;overflow:hidden">
        <div style="height:100%;width:${goalPct}%;background:linear-gradient(90deg,#10b981,#00e5ff);border-radius:5px;transition:width .5s"></div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px;text-align:right">남은 목표: ${won(Math.max(0, MONTHLY_GOAL-totalMonth))}</div>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:10px">판매 중인 상품 (${live.length})</div>
    ${liveHtml}

    <div style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;margin:18px 0 10px">📒 수익목록 — 직접 기록</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:12px">
      <div style="display:flex;gap:6px;margin-bottom:7px">
        <input id="led-date" type="date" class="form-input" value="${today}" style="flex:1;padding:7px 9px;font-size:12px"/>
        <input id="led-amount" type="number" inputmode="numeric" class="form-input" placeholder="금액(원)" style="width:110px;padding:7px 9px;font-size:12px"/>
      </div>
      <input id="led-item" class="form-input" placeholder="항목 (예: AI 부업 가이드)" style="margin-bottom:7px;padding:7px 9px;font-size:12px"/>
      <div style="display:flex;gap:6px">
        <input id="led-source" class="form-input" placeholder="어디서 (크몽/Gumroad...)" style="flex:1;padding:7px 9px;font-size:12px"/>
        <button class="btn btn-green" style="padding:7px 14px;font-size:12px" onclick="addLedger()">+ 기록</button>
      </div>
    </div>
    ${revenueLedger.length ? revenueLedger.slice(0,40).map((r,i) => `
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 11px;margin-bottom:6px">
        <div style="min-width:0;flex:1">
          <div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.item||'(항목 없음)'}</div>
          <div style="font-size:10px;color:var(--muted)">${r.date} · ${r.source||'-'}${r.memo?' · '+r.memo:''}</div>
        </div>
        <div style="font-size:13px;font-weight:800;color:var(--green);white-space:nowrap">${won(r.amount)}</div>
        <button onclick="delLedger(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px">✕</button>
      </div>`).join('') : '<div style="text-align:center;color:var(--muted);font-size:11px;padding:10px">아직 기록이 없어요. 수익이 생기면 여기에 적어두세요.</div>'}
  `, [
    {label:'닫기', cls:'btn-accent', action:'closeModal()'},
  ]);
}

function addLedger() {
  const date = document.getElementById('led-date').value || todayStr();
  const amount = parseInt((document.getElementById('led-amount').value||'').replace(/[^\d]/g,''), 10);
  const item = (document.getElementById('led-item').value||'').trim();
  const source = (document.getElementById('led-source').value||'').trim();
  if (!amount || amount <= 0) { alert('금액을 입력해주세요'); return; }
  revenueLedger.unshift({ date, item, source, amount, memo:'' });
  revenueLedger = revenueLedger.slice(0, 200);
  saveLedger();
  openRevenue();
  showNotif('📒 기록 완료', `${won(amount)} 기록했어요.`, [], true);
}

function delLedger(i) {
  revenueLedger.splice(i, 1);
  saveLedger();
  openRevenue();
}

function addRevenue(idx) {
  const inp = document.getElementById('rev-' + idx);
  if (!inp) return;
  const amt = parseInt((inp.value||'').replace(/[^\d]/g,''), 10);
  if (!amt || amt <= 0) { alert('금액을 입력해주세요'); return; }
  const proj = completedProjects[idx];
  if (!proj) return;
  if (!proj.revenue) proj.revenue = [];
  // 오늘 날짜에 누적 (같은 날 여러 번 입력 시 합산)
  const today = todayStr();
  const existing = proj.revenue.find(r => r.date === today);
  if (existing) existing.amount += amt;
  else proj.revenue.push({ date: today, amount: amt });
  saveDone();
  openRevenue(); // 새로고침
  showNotif('💰 입력 완료', `${won(amt)} 추가되었습니다.`, [], true);
}

function openDoneList() {
  if (completedProjects.length === 0) {
    openModal('doneModal', '📋 완료 프로젝트', `<div class="empty" style="text-align:center;padding:40px 20px;color:var(--muted)"><div style="font-size:36px;margin-bottom:10px">📋</div><div>완료된 프로젝트가 없습니다</div></div>`, [{label:'닫기',cls:'btn-accent',action:'closeModal()'}]);
    return;
  }
  const list = completedProjects.map((p,i) => `
    <div class="done-card">
      <div class="done-header"><div class="done-name">✅ ${p.project.name}</div><div class="done-time">${p.timestamp}</div></div>
      <div style="font-size:11px;color:var(--muted)">${p.project.platform} · ${p.project.revenue}</div>
      <div class="done-actions">
        <button class="btn btn-accent" style="padding:5px 11px;font-size:11px" onclick="viewDoneResult(${i})">결과물 보기</button>
        <button class="btn btn-green" style="padding:5px 11px;font-size:11px" onclick="pdfDone(${i})">📄 PDF</button>
        <button class="btn btn-purple" style="padding:5px 11px;font-size:11px" onclick="showUploadGuide(completedProjects[${i}].project)">📤 올리는 법</button>
      </div>
    </div>
  `).join('');
  openModal('doneModal', `📋 완료 프로젝트 (${completedProjects.length}건)`, list, [{label:'닫기',cls:'btn-accent',action:'closeModal()'}]);
}

function viewDoneResult(i) {
  const p = completedProjects[i];
  const editorResult = p.results['editor'] || Object.values(p.results)[0] || '';
  openModal('doneResultModal', p.project.name, `<div class="review-result">${editorResult}</div>`, [{label:'닫기',cls:'btn-accent',action:'closeModal()'}]);
}

function pdfDone(i) {
  const p = completedProjects[i];
  const prev = {currentProject, taskResults};
  currentProject = p.project;
  taskResults = p.results;
  downloadPDF(false);
  currentProject = prev.currentProject;
  taskResults = prev.taskResults;
}

  {name:'custom',     label:'➕ 직접 입력', hint:'아무 원격 MCP 서버나 추가', urlHint:'https://.../sse 또는 /mcp'},
];

function openMcpCenter() {
  const installed = mcpServers.length ? mcpServers.map((m,i) => `
    <div style="background:var(--card);border:1px solid var(--border);border-left:3px solid ${m.enabled?'var(--green)':'var(--muted)'};border-radius:10px;padding:11px 13px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13px;color:${m.enabled?'var(--green)':'var(--text)'}">${m.enabled?'🟢':'⚪'} ${m.name}</div>
          <div style="font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.url||'(URL 없음)'}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn ${m.enabled?'btn-yellow':'btn-green'}" style="padding:4px 9px;font-size:10px" onclick="toggleMcp(${i})">${m.enabled?'끄기':'켜기'}</button>
          <button class="btn btn-red" style="padding:4px 9px;font-size:10px" onclick="deleteMcp(${i})">삭제</button>
        </div>
      </div>
    </div>
  `).join('') : `<div style="text-align:center;padding:24px;color:var(--muted);font-size:12px">연동된 MCP가 없습니다</div>`;

  openModal('mcpModal', '🔌 MCP 연동 센터', `
    <div style="background:#f59e0b10;border:1px solid #f59e0b33;border-radius:10px;padding:11px 13px;margin-bottom:14px;font-size:11px;color:#f59e0b;line-height:1.7">
      ⚠️ <strong>원격(URL) MCP 서버만 연동됩니다.</strong> Anthropic 공식 MCP 커넥터를 사용해요.
      로컬 데스크톱 앱(Canva 앱 등)은 브라우저에서 실행 불가합니다.
      연동 후엔 모든 직원이 해당 도구를 자동으로 사용합니다.
    </div>

    <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:8px">연동된 서버</div>
    ${installed}

    <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;margin:16px 0 8px">+ 새 MCP 추가</div>
    <div style="margin-bottom:10px"><label class="form-label">이름</label>
      <input id="mcp-name" class="form-input" placeholder="예: web-search"/></div>
    <div style="margin-bottom:10px"><label class="form-label">서버 URL (원격 SSE/HTTP 엔드포인트)</label>
      <input id="mcp-url" class="form-input" placeholder="https://example.com/sse"/></div>
    <div style="margin-bottom:10px"><label class="form-label">인증 토큰 (선택)</label>
      <input id="mcp-token" class="form-input" type="password" placeholder="필요한 경우만 입력"/></div>
  `, [
    {label:'➕ 추가하기', cls:'btn-green', action:'addMcp()', primary:true},
    {label:'닫기', cls:'btn-red', action:'closeModal()'},
  ]);
}

function addMcp() {
  const name = document.getElementById('mcp-name')?.value.trim();
  const url = document.getElementById('mcp-url')?.value.trim();
  const token = document.getElementById('mcp-token')?.value.trim();
  if (!name || !url) { alert('이름과 서버 URL은 필수입니다'); return; }
  if (!/^https?:\/\//.test(url)) { alert('URL은 http:// 또는 https:// 로 시작해야 합니다'); return; }
  mcpServers.push({ id:'mcp_'+Date.now(), name, url, token: token||'', enabled:true });
  saveMcp();
  openMcpCenter();
}

function toggleMcp(i) { mcpServers[i].enabled = !mcpServers[i].enabled; saveMcp(); openMcpCenter(); }
function deleteMcp(i) { if(!confirm('이 MCP 연동을 삭제할까요?')) return; mcpServers.splice(i,1); saveMcp(); openMcpCenter(); }

// ── 실제 음원 생성
async function generateMusic(stylePrompt, lyrics, title) {
  if (!sunoCfg.baseUrl) throw new Error('Suno API가 연동되지 않았습니다 (🎵 음악연동에서 설정)');
  const headers = { 'Content-Type':'application/json' };
  if (sunoCfg.apiKey) headers['Authorization'] = 'Bearer ' + sunoCfg.apiKey;
  const instrumental = !!sunoCfg.instrumental;

  if (sunoCfg.mode === 'sync') {
    // gcui-art/suno-api 스타일: /api/custom_generate, wait_audio:true → [{audio_url,title}]
    const body = {
      prompt: lyrics || '',
      tags: stylePrompt || '',
      title: title || 'NEXIVA Track',
      make_instrumental: instrumental,
      wait_audio: true
    };
    const res = await fetch(sunoCfg.baseUrl + '/api/custom_generate', { method:'POST', headers, body: JSON.stringify(body) });
    if (!res.ok) throw new Error('Suno 호출 실패: HTTP ' + res.status);
    const data = await res.json();
    const arr = Array.isArray(data) ? data : (data.clips || data.data || []);
    return arr.map(c => ({ title: c.title||title||'Track', url: c.audio_url||c.audioUrl||c.audio })).filter(c=>c.url);
  } else {
    // 비동기식: POST /api/v1/generate → taskId → 폴링
    const body = {
      prompt: lyrics || stylePrompt || '',
      style: stylePrompt || '',
      title: title || 'NEXIVA Track',
      customMode: true,
      instrumental: instrumental,
      model: sunoCfg.model || undefined
    };
    const res = await fetch(sunoCfg.baseUrl + '/api/v1/generate', { method:'POST', headers, body: JSON.stringify(body) });
    if (!res.ok) throw new Error('Suno 생성요청 실패: HTTP ' + res.status);
    const init = await res.json();
    const taskId = init.taskId || init.task_id || init.data?.taskId || init.id;
    if (!taskId) throw new Error('작업ID를 받지 못했습니다: ' + JSON.stringify(init).slice(0,120));
    // 폴링 (최대 5분)
    for (let i=0; i<60; i++) {
      await sleep(5000);
      const pr = await fetch(sunoCfg.baseUrl + '/api/v1/generate/record-info?taskId=' + encodeURIComponent(taskId), { headers });
      if (!pr.ok) continue;
      const pd = await pr.json();
      const items = pd.data?.response?.sunoData || pd.data?.sunoData || pd.data || [];
      const ready = (Array.isArray(items)?items:[]).filter(c => c.audioUrl || c.audio_url);
      if (ready.length) return ready.map(c => ({ title: c.title||title||'Track', url: c.audioUrl||c.audio_url }));
      const status = pd.data?.status || pd.status;
      if (/fail|error/i.test(status||'')) throw new Error('생성 실패: ' + status);
    }
    throw new Error('생성 시간 초과 (5분)');
  }
}

let lastDesignSvg = '';

async function generateCoverDesign() {

- 시선 흐름: 가장 큰 메인 제목 → 부제 → 핵심 혜택 1~2줄 → 하단 브랜드/뱃지

    else setStatus(`<span style="color:var(--red)">❌ ${e.message}</span>`);

function downloadDesignSVG() {
  if (!lastDesignSvg) return;
  const blob = new Blob([lastDesignSvg], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = (currentProject?currentProject.name:'design').replace(/[\/\\:*?"<>|]/g,'_') + '.svg';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function downloadDesignPNG() {
  if (!lastDesignSvg) return;
  // viewBox에서 크기 추출
  let w = 1080, h = 1350;
  const vb = lastDesignSvg.match(/viewBox=["']\s*[\d.]+\s+[\d.]+\s+([\d.]+)\s+([\d.]+)/i);
  if (vb) { w = Math.round(parseFloat(vb[1])); h = Math.round(parseFloat(vb[2])); }
  const svgBlob = new Blob([lastDesignSvg], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = function() {
    const scale = 2; // 고해상도
    const canvas = document.createElement('canvas');
    canvas.width = w*scale; canvas.height = h*scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0b0f17'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(blob) {
      const u = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = u; a.download = (currentProject?currentProject.name:'design').replace(/[\/\\:*?"<>|]/g,'_') + '.png';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(u), 1000);
    }, 'image/png');
  };
  img.onerror = function() { URL.revokeObjectURL(url); alert('PNG 변환 실패 — SVG로 저장 후 사용해주세요'); };
  img.src = url;
}

// SVG 문자열 → PNG 파일 저장 (범용)
function svgToPng(svgStr, filename) {
  let w = 1080, h = 1080;
  const vb = svgStr.match(/viewBox=["']\s*[\d.]+\s+[\d.]+\s+([\d.]+)\s+([\d.]+)/i);
  if (vb) { w = Math.round(parseFloat(vb[1])); h = Math.round(parseFloat(vb[2])); }
  const blob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    const scale = 2;
    const c = document.createElement('canvas');
    c.width = w*scale; c.height = h*scale;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,c.width,c.height);
    ctx.drawImage(img, 0, 0, c.width, c.height);
    URL.revokeObjectURL(url);
    c.toBlob(function(b) {
      const u = URL.createObjectURL(b);
      const a = document.createElement('a');
      a.href = u; a.download = filename + '.png';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(u), 1000);
    }, 'image/png');
  };
  img.onerror = function(){ URL.revokeObjectURL(url); alert('PNG 변환 실패'); };
  img.src = url;
}

function studioDownloadPNG(i) { if (studioSvgs[i]) svgToPng(studioSvgs[i], 'nexiva_image_' + (i+1)); }
function studioDownloadSVG(i) {
  if (!studioSvgs[i]) return;
  const blob = new Blob([studioSvgs[i]], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'nexiva_image_' + (i+1) + '.svg';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);

function guessKind(p) {
  if (!p) return 'doc';
  const t = ((p.name||'') + (p.dept||'') + (p.plan||'')).toLowerCase();
  if (/비트|beat|808|트랩|힙합/.test(t)) return 'beat';
  if (/음악|뮤직|music|bgm|노래|작곡|suno|udio|sound/.test(t)) return 'music';
  if (/영상|비디오|video|유튜브|youtube|숏폼|쇼츠|릴스|틱톡/.test(t)) return 'video';
  return 'doc';
}

// 텍스트 파일(.txt)로 저장 — 프롬프트 패키지용
function saveTxt(filename, text) {
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename.replace(/[\/\\:*?"<>|]/g,'_') + '.txt';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

// ═══════════════════════════════════════════════
//  작업 큐 — 순차 처리 (끝나자마자 다음 자동 시작)
// ═══════════════════════════════════════════════
function enqueueJob(staffId, prompt, label) {
  const s = getStaff(staffId);
  if (!s || !prompt) return;
  taskQueue.push({
    id: 'job_' + Date.now() + '_' + Math.floor(Math.random()*1000),
    staffId, prompt,
    label: label || (s.name + ' 업무'),
    status: 'pending', result: '', time: ''
  });
  saveQueue();
  updateQueueBadge();
  processQueue(); // 이미 돌고 있으면 무시됨, 아니면 시작
}

async function processQueue() {
  if (queueRunning) return;        // 이미 처리 중이면 중복 실행 방지
  queueRunning = true;

  while (true) {
    const job = taskQueue.find(j => j.status === 'pending');
    if (!job) break;               // 대기 작업 없음 → 종료

    job.status = 'running';
    saveQueue();
    taskStatus[job.staffId] = 'working';
    renderOffice(); refreshQueueModal(); updateQueueBadge();

    const s = getStaff(job.staffId);
    if (!s) { job.status = 'error'; job.result = '직원 없음'; saveQueue(); continue; }

    // rate limit 자동 대기 후 재시도 (최대 10회)
    let ok = false;
    for (let attempt = 0; attempt < 10 && !ok; attempt++) {
      try {
        const result = await callClaudeStream(s.prompt, [{role:'user', content: job.prompt}], job.staffId, (partial) => {
          streamBuf[job.staffId] = partial;
          updateLivePanel(job.staffId, partial);
        });
        job.result = result;
        job.status = 'done';
        job.time = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
        ok = true;
        taskStatus[job.staffId] = 'done';

        // 완료목록에 저장 (Firebase/폰 동기화 + 영구 보관)
        completedProjects.unshift({
          project: { name: job.label, platform: '작업큐', revenue: '-', plan: job.prompt.slice(0,80), dept: s.dept },
          results: { editor: result },
          timestamp: new Date().toLocaleString('ko-KR'),
          status: 'task', kind: 'doc', live: false, revenue: [], fromQueue: true
        });
        saveDone();
      } catch(e) {
        if (e.message && e.message.startsWith('rate_limit:')) {
          const w = parseInt(e.message.split(':')[1],10) || 60;
          await sleep((w+2)*1000);   // 휴식 후 재시도
        } else {
          job.status = 'error'; job.result = '오류: ' + e.message;
          taskStatus[job.staffId] = 'error'; ok = true;
        }
      }
    }
    if (!ok) { job.status = 'error'; job.result = '재시도 초과'; }
    saveQueue();
    renderOffice(); refreshQueueModal(); updateQueueBadge();
    // 즉시 다음 루프 → 다음 대기 작업 바로 진행
  }

  queueRunning = false;
  updateQueueBadge();
  // 완료된 작업이 있으면 알림
  const doneCount = taskQueue.filter(j => j.status === 'done').length;
  if (doneCount > 0) showNotif('🗂️ 작업 큐 완료', '대기 중인 모든 업무를 끝냈습니다.', [], true);
}

  const pending = taskQueue.filter(j => j.status === 'pending' || j.status === 'running').length;
  btn.textContent = pending > 0 ? `🗂️ 작업큐 (${pending})` : '🗂️ 작업큐';
}

      <input id="q-label" class="form-input" placeholder="예: 7월 프로모션 카피 작성" style="margin-bottom:8px"/>
      <label class="form-label">업무 지시 내용</label>
      <textarea id="q-prompt" class="form-textarea" placeholder="무엇을 해야 하는지 구체적으로 적어주세요" style="min-height:70px;margin-bottom:10px"></textarea>
      <button class="btn btn-green" style="width:100%" onclick="addJobFromForm()">➕ 큐에 추가</button>
    </div>
    ${pendingRunning.length ? `<div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:8px">진행/대기 (${pendingRunning.length})</div>${pendingRunning.map(jobRow).join('')}` : '<div style="text-align:center;color:var(--muted);font-size:12px;padding:14px">대기 중인 업무가 없어요</div>'}
    ${finished.length ? `<div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin:14px 0 8px">완료/오류 (${finished.length}) <button onclick="clearFinishedJobs()" style="background:none;border:none;color:var(--red);font-size:10px;cursor:pointer;float:right">정리</button></div>${finished.slice(0,8).map(jobRow).join('')}` : ''}
  `, [{label:'닫기', cls:'btn-accent', action:'closeModal()'}]);
}

function refreshQueueModal() {
  if (activeModal !== 'queueModal') return;
  // 사용자가 입력 중이면(폼 타이핑) 새로고침 보류 — 입력 내용 보호
  const ae = document.activeElement;
  if (ae && (ae.id === 'q-prompt' || ae.id === 'q-label' || ae.id === 'q-staff')) return;
  openQueueModal();
}

function addJobFromForm() {
  const staffId = document.getElementById('q-staff').value;
  const label = document.getElementById('q-label').value.trim();
  const prompt = document.getElementById('q-prompt').value.trim();
  if (!prompt) { alert('업무 지시 내용을 입력해주세요'); return; }
  enqueueJob(staffId, prompt, label);
  openQueueModal(); // 새로고침
}

function removeJob(id) {
  taskQueue = taskQueue.filter(j => j.id !== id || j.status !== 'pending');
  saveQueue(); openQueueModal(); updateQueueBadge();
}

function clearFinishedJobs() {
  taskQueue = taskQueue.filter(j => j.status === 'pending' || j.status === 'running');
  saveQueue(); openQueueModal();
}

function viewJobResult(id) {
  const j = taskQueue.find(x => x.id === id);
  if (!j) return;
  window._jobText = j.result || '';
  window._jobLabel = j.label || 'result';
  openModal('jobResultModal', '🗂️ ' + j.label, `<div class="review-result">${j.result || '결과 없음'}</div>`, [
    {label:'📋 복사', cls:'btn-accent', action:'copyText(window._jobText||"")'},
    {label:'💾 .txt 저장', cls:'btn-green', action:'saveTxt(window._jobLabel||"result", window._jobText||"")'},
    {label:'닫기', cls:'btn-accent', action:'closeModal();openQueueModal()'}
  ]);
}

// ═══════════════════════════════════════════════
//  부트
// ═══════════════════════════════════════════════
function boot() {
  renderAll();
  setTimeout(startSpeechTimers, 2000);
  if (cloudCfg.enabled && cloudCfg.dbUrl && cloudCfg.code) cloudConnect();
  updateQueueBadge();
  updateBriefBadge();
  // 새로고침해도 대기 중이던 작업 자동 재개
  if (taskQueue.some(j => j.status === 'pending' || j.status === 'running')) {
    taskQueue.forEach(j => { if (j.status === 'running') j.status = 'pending'; }); // 중단됐던 건 대기로
    saveQueue();
    setTimeout(processQueue, 1500);
  }
}
</script>
</body>
</html>
